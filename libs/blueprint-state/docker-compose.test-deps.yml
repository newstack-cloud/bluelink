services:
  postgres:
    image: postgres:17.3
    networks:
      - blueprint_state_tests
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - 45432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres_migrate:
    image: migrate/migrate:v4.18.2
    restart: always
    networks:
      - blueprint_state_tests
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "pgx5://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST_FOR_MIGRATE}:5432/${POSTGRES_DB}?sslmode=disable",
        "up",
      ]
    links:
      - postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./postgres/migrations:/migrations

  adminer:
    image: adminer
    restart: always
    networks:
      - blueprint_state_tests
    ports:
      - 8080:8080

  # AWS S3 emulator for objectstore backend tests.
  localstack:
    image: localstack/localstack:4.0
    networks:
      - blueprint_state_tests
    restart: always
    environment:
      SERVICES: s3
      DEFAULT_REGION: eu-west-1
      AWS_DEFAULT_REGION: eu-west-1
      DEBUG: 0
    ports:
      - 4566:4566
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Google Cloud Storage emulator for objectstore backend tests.
  fake-gcs-server:
    image: fsouza/fake-gcs-server:1.50
    networks:
      - blueprint_state_tests
    restart: always
    command:
      [
        "-scheme",
        "http",
        "-port",
        "4443",
        "-public-host",
        "localhost:4443",
        "-backend",
        "memory",
      ]
    ports:
      - 4443:4443
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4443/storage/v1/b"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Azure Blob Storage emulator for objectstore backend tests.
  # AZURITE_ACCOUNTS forces the shared-key used by Azurite to match the
  # canonical dev-store key that the objectstore integration tests sign
  # with — newer Azurite images ship a different built-in default which
  # produces AuthorizationFailure against requests signed with the
  # documented dev key.
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.33.0
    networks:
      - blueprint_state_tests
    restart: always
    environment:
      AZURITE_ACCOUNTS: "devstoreaccount1:Eby8vdM02xNOcqFlqUwJPLlmEh4azupw3DM4mLuEG/nPYe3WtKHnUsCjN+BpYqzBz+q/MCm7wfMhDqg4qyN+5Q=="
    command:
      [
        "azurite-blob",
        "--blobHost",
        "0.0.0.0",
        "--blobPort",
        "10000",
        "--skipApiVersionCheck",
      ]
    ports:
      - 10000:10000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  blueprint_state_tests:
    name: blueprint_state_tests
    driver: bridge

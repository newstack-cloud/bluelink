version: 2025-11-02
resources:
  goodFunction:
    type: aws/lambda2/function
    description: "Function that deploys successfully."
    metadata:
      labels:
        app: linked
    spec:
      handler: "src/good.handler"

  eventsRule:
    type: aws/events2/rule
    description: "Rule linked to the function."
    linkSelector:
      byLabel:
        app: linked
    spec:
      targetArn: "static-arn"

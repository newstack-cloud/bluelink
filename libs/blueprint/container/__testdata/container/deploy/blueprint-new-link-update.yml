version: 2025-11-02
resources:
  nightlyRule:
    type: aws/events2/rule
    description: "Modified rule linked to the sync function."
    linkSelector:
      byLabel:
        app: sync
    spec:
      targetArn: "static-arn-v2"

  syncFunction:
    type: aws/lambda2/function
    description: "Modified function that now links to the new jobs function."
    metadata:
      labels:
        app: sync
    linkSelector:
      byLabel:
        app: jobs
    spec:
      handler: "src/sync_v2.handler"

  jobsFunction:
    type: aws/jobs2/function
    description: "New function added in the updated blueprint."
    metadata:
      labels:
        app: jobs
    spec:
      handler: "src/jobs.handler"

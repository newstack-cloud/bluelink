name: Windows Installer Build

on:
  workflow_dispatch:
    inputs:
      manager_version:
        description: "Bluelink Manager version (e.g., v0.1.0)"
        required: true
        type: string
      profile:
        description: "Product profile to build"
        required: true
        type: choice
        options:
          - bluelink
          - celerity
        default: bluelink
  workflow_call:
    inputs:
      manager_version:
        description: "Bluelink Manager version (e.g., v0.1.0)"
        required: true
        type: string
      profile:
        description: "Product profile to build (bluelink or celerity)"
        required: false
        type: string
        default: bluelink
    secrets:
      AZURE_TENANT_ID:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_ENDPOINT:
        required: false
      AZURE_CODE_SIGNING_NAME:
        required: false
      AZURE_CERT_PROFILE_NAME:
        required: false

permissions:
  contents: write

jobs:
  build-msi:
    name: Build ${{ inputs.profile == 'celerity' && 'Celerity' || 'Bluelink' }} MSI
    runs-on: windows-latest
    env:
      PROFILE: ${{ inputs.profile || 'bluelink' }}
      PRODUCT_NAME: ${{ inputs.profile == 'celerity' && 'Celerity' || 'Bluelink' }}
      RELEASE_TAG: ${{ inputs.profile == 'celerity' && 'windows-installer-celerity-latest' || 'windows-installer-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: tools/bluelink-manager/${{ inputs.manager_version }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: tools/bluelink-manager/go.sum

      - name: Derive installer version
        id: version
        run: |
          # Strip 'v' prefix from version
          $version = "${{ inputs.manager_version }}" -replace '^v', ''
          echo "installer_version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create binaries directory
        run: New-Item -ItemType Directory -Force -Path binaries
        shell: pwsh

      - name: Build Bluelink Manager
        run: |
          cd tools/bluelink-manager
          $version = "${{ inputs.manager_version }}" -replace '^v', ''
          go build -ldflags "-X github.com/newstack-cloud/bluelink/tools/bluelink-manager/cmd/commands.Version=$version" -o ..\..\binaries\bluelink-manager.exe ./cmd
        shell: pwsh

      - name: Verify binaries
        run: |
          Write-Host "Binaries directory contents:"
          Get-ChildItem binaries
          if (-not (Test-Path binaries\bluelink-manager.exe)) { throw "bluelink-manager.exe not found" }
          # Test that the binary runs
          & binaries\bluelink-manager.exe version
        shell: pwsh

      - name: Install WiX Toolset
        run: dotnet tool install --global wix

      - name: Add WiX UI extension
        run: wix extension add WixToolset.UI.wixext

      - name: Build MSI
        run: |
          wix build tools/windows-installer/Package.wxs `
            -d ProductVersion=${{ steps.version.outputs.installer_version }} `
            -d BinariesDir=${{ github.workspace }}\binaries `
            -d Profile=${{ env.PROFILE }} `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -bindpath tools/windows-installer `
            -out ${{ env.PRODUCT_NAME }}-${{ steps.version.outputs.installer_version }}-x64.msi
        shell: pwsh

      - name: Sign MSI with Azure Trusted Signing
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/trusted-signing-action@v1.1.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}
          files-folder-filter: msi
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Generate checksum
        run: |
          $hash = Get-FileHash -Algorithm SHA256 ${{ env.PRODUCT_NAME }}-${{ steps.version.outputs.installer_version }}-x64.msi
          "$($hash.Hash.ToLower())  ${{ env.PRODUCT_NAME }}-${{ steps.version.outputs.installer_version }}-x64.msi" | Out-File -Encoding utf8 ${{ env.PRODUCT_NAME }}-${{ steps.version.outputs.installer_version }}-x64.msi.sha256
        shell: pwsh

      - name: Delete old release assets
        run: |
          # Get all assets from the release and delete them
          $assets = gh release view ${{ env.RELEASE_TAG }} --json assets --jq '.assets[].name' 2>$null
          if ($LASTEXITCODE -eq 0 -and $assets) {
            foreach ($asset in $assets) {
              Write-Host "Deleting old asset: $asset"
              gh release delete-asset ${{ env.RELEASE_TAG }} $asset --yes
            }
          } else {
            Write-Host "No existing release or assets found"
          }
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.PRODUCT_NAME }} Windows Installer
          draft: false
          prerelease: false
          make_latest: false
          files: |
            ${{ env.PRODUCT_NAME }}-${{ steps.version.outputs.installer_version }}-x64.msi
            ${{ env.PRODUCT_NAME }}-${{ steps.version.outputs.installer_version }}-x64.msi.sha256
          body: |
            ## ${{ env.PRODUCT_NAME }} Windows Installer

            **Version:** ${{ steps.version.outputs.installer_version }}
            **Manager Version:** ${{ inputs.manager_version }}

            This installer sets up ${{ env.PRODUCT_NAME }} on Windows. It installs the Bluelink Manager and automatically downloads and configures all ${{ env.PRODUCT_NAME }} components.

            ### Installation

            1. Download `${{ env.PRODUCT_NAME }}-${{ steps.version.outputs.installer_version }}-x64.msi`
            2. Run the installer (no Administrator privileges required)
            3. Wait for the installation to complete (downloads ~100MB of components)
            4. Open a new terminal and run: `${{ env.PROFILE }} --help`

            ### What Gets Installed

            - **${{ env.PRODUCT_NAME }} CLI** - Command-line interface
            - **Deploy Engine** - Background service for deployments (auto-starts)
            - **Blueprint Language Server** - IDE support for .blueprint.(yaml|yml|jsonc) files
            - **Bluelink Manager** - Tool for managing and updating components

            All binaries are installed to `%LOCALAPPDATA%\NewStack\Bluelink\bin\`

            ### Managing ${{ env.PRODUCT_NAME }}

            ```powershell
            # Check installation status
            bluelink-manager status

            # Update all components to latest versions
            bluelink-manager update

            # Manage the Deploy Engine service
            bluelink-manager start
            bluelink-manager stop
            bluelink-manager restart

            # Uninstall ${{ env.PRODUCT_NAME }} components (keeps config)
            bluelink-manager uninstall --profile ${{ env.PROFILE }}

            # Uninstall everything including config
            bluelink-manager uninstall --all
            ```

            ### Uninstalling

            1. Run `bluelink-manager uninstall --profile ${{ env.PROFILE }}` to remove ${{ env.PRODUCT_NAME }} components
            2. Open **Settings** > **Apps** > **Installed apps**
            3. Search for "${{ env.PRODUCT_NAME }}" and uninstall

            ### Verify Download

            ```powershell
            (Get-FileHash ${{ env.PRODUCT_NAME }}-${{ steps.version.outputs.installer_version }}-x64.msi -Algorithm SHA256).Hash.ToLower()
            ```

            Compare with the checksum in `${{ env.PRODUCT_NAME }}-${{ steps.version.outputs.installer_version }}-x64.msi.sha256`
